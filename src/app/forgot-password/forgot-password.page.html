<ion-content [fullscreen]="true" class="forgot-password-content">
  <div class="background-overlay"></div>
  
  <div class="forgot-password-container">
    <!-- Back Button -->
    <button class="back-btn" (click)="goBack()">
      <ion-icon name="arrow-back"></ion-icon>
    </button>

    <!-- Header -->
    <div class="welcome-section">
      <div class="icon-container">
        <ion-icon name="lock-closed-outline"></ion-icon>
      </div>
      <h1 class="welcome-title">Mot de passe oublié ?</h1>
      <p class="welcome-subtitle">Pas de souci, nous allons vous aider à le réinitialiser</p>
    </div>

    <!-- Reset Form -->
    <div class="reset-form">
      <div class="input-group">
        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
        <input 
          type="email" 
          [(ngModel)]="email" 
          placeholder="Entrez votre e-mail"
          class="custom-input"
        />
      </div>

      <button class="reset-btn" (click)="resetPassword()">
        Envoyer le lien de réinitialisation
      </button>

      <p class="info-text">
        <ion-icon name="information-circle-outline"></ion-icon>
        Un e-mail avec un lien de réinitialisation sera envoyé à l'adresse indiquée.
      </p>

      <!-- Back to login link -->
      <p class="login-text">
        Vous vous souvenez de votre mot de passe ? 
        <a (click)="goToLogin()">Connectez-vous</a>
      </p>
    </div>
  </div>
</ion-content>
